name: Validate and publish release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  quality:
    name: Full release quality gates
    uses: ./.github/workflows/continuous-validation.yml

  metadata:
    name: Validate release metadata
    uses: ./.github/workflows/release-metadata-validation.yml
    with:
      release_tag: ${{ github.ref_name }}

  publish:
    name: Publish GitHub Release
    needs: [quality, metadata]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Extract canonical release notes
        run: |
          mkdir -p build
          python3 tool/release.py notes "$GITHUB_REF_NAME" \
            > build/release-notes.md

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release edit "$GITHUB_REF_NAME" \
              --title "$GITHUB_REF_NAME" \
              --notes-file build/release-notes.md
          else
            gh release create "$GITHUB_REF_NAME" \
              --title "$GITHUB_REF_NAME" \
              --notes-file build/release-notes.md \
              --verify-tag
          fi
