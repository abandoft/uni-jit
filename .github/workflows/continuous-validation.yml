name: Continuous validation quality gates

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: continuous-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-metadata:
    name: Release metadata
    uses: ./.github/workflows/release-metadata-validation.yml

  core-platforms:
    name: Core platform validation
    uses: ./.github/workflows/core-platform-validation.yml

  language-baselines:
    name: Language frontend baselines
    uses: ./.github/workflows/language-baselines.yml

  sanitizers:
    name: Sanitizer validation
    uses: ./.github/workflows/sanitizer-validation.yml
