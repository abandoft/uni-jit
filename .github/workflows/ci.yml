name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-metadata:
    name: Release metadata
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - run: python3 tool/release.py check

  lua-reference-baseline:
    name: Lua 5.5 and LuaJIT baseline
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Configure isolated reference runtimes
        run: >-
          cmake -S . -B build/language -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DUNIJIT_BUILD_TESTS=ON
          -DUNIJIT_BUILD_BENCHMARKS=ON
          -DUNIJIT_WARNINGS_AS_ERRORS=ON
          -DUNIJIT_BUILD_LUA_REFERENCE=ON
          -DUNIJIT_BUILD_LUAJIT_REFERENCE=ON

      - name: Build reference runtimes
        run: >-
          cmake --build build/language --parallel
          --target unijit_lua55 unijit_lua55_tests
          unijit_lua55_benchmark_runner unijit_luajit_reference

      - name: Test UniJIT Lua frontend
        run: >-
          ctest --test-dir build/language --output-on-failure
          -R unijit.lua55_

      - name: Run semantic and performance baseline
        run: >-
          python3 benchmark/lua/run_reference.py
          --lua build/language/bin/lua5.5-reference
          --luajit build/language/references/luajit/src/luajit
          --warmup 10000 --iterations 100000 --samples 3
          > build/language/lua-reference.json

      - name: Compare stock Lua, UniJIT, and LuaJIT integer execution
        run: >-
          python3 benchmark/lua/run_integer.py
          --lua build/language/bin/lua5.5-reference
          --unijit build/language/bin/lua5.5-unijit
          --luajit build/language/references/luajit/src/luajit
          --warmup 10000 --iterations 100000 --samples 3
          > build/language/lua-integer.json

      - name: Compare stock Lua, UniJIT, and LuaJIT numeric loops
        run: >-
          python3 benchmark/lua/run_integer.py
          --script benchmark/lua/integer_loop.lua
          --lua build/language/bin/lua5.5-reference
          --unijit build/language/bin/lua5.5-unijit
          --luajit build/language/references/luajit/src/luajit
          --warmup 100 --iterations 1000 --samples 3
          > build/language/lua-integer-loop.json

      - name: Compare stock Lua, UniJIT, and LuaJIT Float64 execution
        run: >-
          python3 benchmark/lua/run_integer.py
          --script benchmark/lua/float_call.lua
          --lua build/language/bin/lua5.5-reference
          --unijit build/language/bin/lua5.5-unijit
          --luajit build/language/references/luajit/src/luajit
          --warmup 10000 --iterations 100000 --samples 3
          > build/language/lua-float.json

  quickjs-reference-baseline:
    name: QuickJS frontend and baseline
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Configure stock QuickJS and UniJIT frontend
        run: >-
          cmake -S . -B build/quickjs -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DUNIJIT_BUILD_TESTS=ON
          -DUNIJIT_BUILD_BENCHMARKS=ON
          -DUNIJIT_WARNINGS_AS_ERRORS=ON
          -DUNIJIT_BUILD_QUICKJS_REFERENCE=ON

      - name: Build QuickJS frontend and benchmark
        run: >-
          cmake --build build/quickjs --parallel
          --target unijit_quickjs_tests unijit_quickjs_benchmark

      - name: Test QuickJS frontend
        run: >-
          ctest --test-dir build/quickjs --output-on-failure
          -R unijit.quickjs_frontend

      - name: Compare stock QuickJS and UniJIT calls
        run: >-
          build/quickjs/bin/unijit_quickjs_benchmark
          --warmup 10000 --iterations 100000 --samples 3
          > build/quickjs/quickjs-call.json

  pocketpy-reference-baseline:
    name: PocketPy 2.1.8 frontend and baseline
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Configure stock PocketPy and UniJIT frontend
        run: >-
          cmake -S . -B build/pocketpy -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DUNIJIT_BUILD_TESTS=ON
          -DUNIJIT_BUILD_BENCHMARKS=ON
          -DUNIJIT_WARNINGS_AS_ERRORS=ON
          -DUNIJIT_BUILD_POCKETPY_REFERENCE=ON

      - name: Build PocketPy frontend and benchmark
        run: >-
          cmake --build build/pocketpy --parallel
          --target unijit_pocketpy_reference_tests
          unijit_pocketpy_translator_tests unijit_pocketpy_benchmark

      - name: Test PocketPy frontend
        run: >-
          ctest --test-dir build/pocketpy --output-on-failure
          -R unijit.pocketpy_

      - name: Compare stock PocketPy and UniJIT calls
        run: >-
          build/pocketpy/bin/unijit_pocketpy_benchmark
          --warmup 10000 --iterations 100000 --samples 3
          > build/pocketpy/pocketpy-call.json

  build-and-test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux GCC x86-64
            os: ubuntu-24.04
            cc: gcc
            cxx: g++
          - name: Linux Clang x86-64
            os: ubuntu-24.04
            cc: clang
            cxx: clang++
          - name: macOS Clang AArch64
            os: macos-15
            cc: clang
            cxx: clang++
          - name: macOS Clang x86-64
            os: macos-15-intel
            cc: clang
            cxx: clang++
          - name: Windows MSVC x86-64
            os: windows-2025
            cc: cl
            cxx: cl
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Configure Unix
        if: runner.os != 'Windows'
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: >-
          cmake -S . -B build/ci -G Ninja
          -DCMAKE_BUILD_TYPE=RelWithDebInfo
          -DUNIJIT_BUILD_POCKETPY_REFERENCE=ON
          -DUNIJIT_WARNINGS_AS_ERRORS=ON

      - name: Configure Windows
        if: runner.os == 'Windows'
        run: >-
          cmake -S . -B build/ci -A x64
          -DUNIJIT_BUILD_POCKETPY_REFERENCE=ON
          -DUNIJIT_WARNINGS_AS_ERRORS=ON

      - name: Build
        run: cmake --build build/ci --config RelWithDebInfo --parallel

      - name: Test
        run: ctest --test-dir build/ci -C RelWithDebInfo --output-on-failure

      - name: Install
        run: >-
          cmake --install build/ci --config RelWithDebInfo
          --prefix build/install

      - name: Configure package consumer on Unix
        if: runner.os != 'Windows'
        run: >-
          cmake -S test/package -B build/consumer -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_PREFIX_PATH=${{ github.workspace }}/build/install

      - name: Configure package consumer on Windows
        if: runner.os == 'Windows'
        run: >-
          cmake -S test/package -B build/consumer -A x64
          -DCMAKE_PREFIX_PATH=${{ github.workspace }}/build/install

      - name: Test installed package
        run: cmake --build build/consumer --config Release --parallel

      - name: Run installed package consumer
        run: ./build/consumer/unijit_package_consumer
        if: runner.os != 'Windows'

      - name: Run installed package consumer on Windows
        run: .\build\consumer\Release\unijit_package_consumer.exe
        if: runner.os == 'Windows'

  sanitizers:
    name: Linux ASan and UBSan
    runs-on: ubuntu-24.04
    env:
      CC: clang
      CXX: clang++
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Configure
        run: >-
          cmake -S . -B build/sanitize -G Ninja
          -DCMAKE_BUILD_TYPE=Debug
          -DUNIJIT_BUILD_POCKETPY_REFERENCE=ON
          -DUNIJIT_WARNINGS_AS_ERRORS=ON
          -DCMAKE_C_FLAGS=-fsanitize=address,undefined
          -DCMAKE_CXX_FLAGS=-fsanitize=address,undefined
          -DCMAKE_EXE_LINKER_FLAGS=-fsanitize=address,undefined

      - name: Build
        run: cmake --build build/sanitize --parallel

      - name: Test
        run: ctest --test-dir build/sanitize --output-on-failure

      - name: Diagnose PocketPy sanitizer failure
        if: failure()
        run: |
          ASAN_OPTIONS=handle_segv=0:detect_leaks=0 gdb --batch \
            -ex 'break frontend/pocketpy/jit_module.cpp:100' \
            -ex run \
            -ex 'print/x owned' \
            -ex 'print/x owned->parameter_count' \
            -ex 'print/x owned->function' \
            -ex 'print/x &native_arguments' \
            -ex 'print/x owned->function->native_entry()' \
            -ex 'x/48bx owned->function->native_entry()' \
            -ex continue \
            -ex 'info registers' \
            -ex 'x/16i $pc-16' \
            -ex bt \
            --args build/sanitize/bin/unijit_pocketpy_translator_tests
