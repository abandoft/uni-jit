name: Sanitizer validation

on:
  workflow_call:

permissions:
  contents: read

jobs:
  address-and-undefined-behavior:
    name: Linux ASan and UBSan
    runs-on: ubuntu-24.04
    env:
      CC: clang
      CXX: clang++
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Configure
        run: >-
          cmake -S . -B build/sanitize -G Ninja
          -DCMAKE_BUILD_TYPE=Debug
          -DUNIJIT_BUILD_LUA_REFERENCE=ON
          -DUNIJIT_BUILD_QUICKJS_REFERENCE=ON
          -DUNIJIT_BUILD_POCKETPY_REFERENCE=ON
          -DUNIJIT_WARNINGS_AS_ERRORS=ON
          -DCMAKE_C_FLAGS=-fsanitize=address,undefined
          -DCMAKE_CXX_FLAGS=-fsanitize=address,undefined
          -DCMAKE_EXE_LINKER_FLAGS=-fsanitize=address,undefined

      - name: Build
        run: cmake --build build/sanitize --parallel

      - name: Test
        run: ctest --test-dir build/sanitize --output-on-failure

  windows-address:
    name: Windows MSVC ASan x86-64
    runs-on: windows-2025
    timeout-minutes: 10
    env:
      ASAN_OPTIONS: abort_on_error=1
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Configure
        run: >-
          cmake -S . -B build/sanitize -A x64
          -DUNIJIT_BUILD_LUA_REFERENCE=ON
          -DUNIJIT_WARNINGS_AS_ERRORS=ON
          -DCMAKE_C_FLAGS=/fsanitize=address
          "-DCMAKE_CXX_FLAGS=/EHsc /fsanitize=address"

      - name: Build Lua frontend qualification
        run: >-
          cmake --build build/sanitize --config Debug --parallel
          --target unijit_lua55_tests

      - name: Expose MSVC AddressSanitizer runtime
        run: |
          $vswhere = Join-Path ${env:ProgramFiles(x86)} "Microsoft Visual Studio/Installer/vswhere.exe"
          $installation = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          if (-not $installation) {
            throw "unable to locate the MSVC installation"
          }
          $versionFile = Join-Path $installation "VC/Auxiliary/Build/Microsoft.VCToolsVersion.default.txt"
          $toolVersion = (Get-Content $versionFile -Raw).Trim()
          $runtime = Join-Path $installation "VC/Tools/MSVC/$toolVersion/bin/Hostx64/x64"
          $asan = Join-Path $runtime "clang_rt.asan_dbg_dynamic-x86_64.dll"
          if (-not (Test-Path $asan)) {
            throw "unable to locate the MSVC x86-64 AddressSanitizer runtime"
          }
          $runtime | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Test Lua frontend
        timeout-minutes: 3
        run: |
          & ./build/sanitize/bin/Debug/unijit_lua55_tests.exe
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }
