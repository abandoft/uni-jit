name: Core platform build and package validation

on:
  workflow_call:

permissions:
  contents: read

jobs:
  build-test-install:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux GCC x86-64
            os: ubuntu-24.04
            cc: gcc
            cxx: g++
          - name: Linux Clang x86-64
            os: ubuntu-24.04
            cc: clang
            cxx: clang++
          - name: macOS Clang AArch64
            os: macos-15
            cc: clang
            cxx: clang++
          - name: macOS Clang x86-64
            os: macos-15-intel
            cc: clang
            cxx: clang++
          - name: Windows MSVC x86-64
            os: windows-2025
            cc: cl
            cxx: cl
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Configure Unix
        if: runner.os != 'Windows'
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: >-
          cmake -S . -B build/platform -G Ninja
          -DCMAKE_BUILD_TYPE=RelWithDebInfo
          -DUNIJIT_BUILD_LUA_REFERENCE=ON
          -DUNIJIT_BUILD_QUICKJS_REFERENCE=ON
          -DUNIJIT_BUILD_POCKETPY_REFERENCE=ON
          -DUNIJIT_BUILD_BENCHMARKS=ON
          -DUNIJIT_WARNINGS_AS_ERRORS=ON

      - name: Configure Windows
        if: runner.os == 'Windows'
        run: >-
          cmake -S . -B build/platform -A x64
          -DUNIJIT_BUILD_LUA_REFERENCE=ON
          -DUNIJIT_BUILD_POCKETPY_REFERENCE=ON
          -DUNIJIT_BUILD_BENCHMARKS=ON
          -DUNIJIT_WARNINGS_AS_ERRORS=ON

      - name: Build
        run: cmake --build build/platform --config RelWithDebInfo --parallel

      - name: Test
        run: >-
          ctest --test-dir build/platform -C RelWithDebInfo
          --output-on-failure

      - name: Measure CFG Float64 register residency on Unix
        if: runner.os != 'Windows'
        run: >-
          ./build/platform/benchmark/unijit_cfg_float64_benchmark
          --loop-iterations 1000 --warmup 100 --invocations 500 --samples 7
          > build/platform/cfg-float64.json

      - name: Measure CFG Float64 register residency on Windows
        if: runner.os == 'Windows'
        run: >-
          .\build\platform\benchmark\RelWithDebInfo\unijit_cfg_float64_benchmark.exe
          --loop-iterations 1000 --warmup 100 --invocations 500 --samples 7
          | Out-File -Encoding utf8 build/platform/cfg-float64.json

      - name: Measure strict SIMD CFG loop on Unix
        if: runner.os != 'Windows'
        run: >-
          ./build/platform/benchmark/unijit_cfg_simd_benchmark
          --loop-iterations 1000 --warmup 100 --invocations 500 --samples 7
          > build/platform/cfg-simd.json

      - name: Measure strict SIMD CFG loop on Windows
        if: runner.os == 'Windows'
        run: >-
          .\build\platform\benchmark\RelWithDebInfo\unijit_cfg_simd_benchmark.exe
          --loop-iterations 1000 --warmup 100 --invocations 500 --samples 7
          | Out-File -Encoding utf8 build/platform/cfg-simd.json

      - name: Enforce CFG Float64 register-residency floor on Unix
        if: runner.os != 'Windows'
        run: >-
          python3 tool/performance_gate.py cfg-float64
          build/platform/cfg-float64.json
          --minimum-speedup 5.0 --maximum-native-code-bytes 400
          > build/platform/cfg-float64-performance-gate.json

      - name: Enforce CFG Float64 register-residency floor on Windows
        if: runner.os == 'Windows'
        run: >-
          python tool/performance_gate.py cfg-float64
          build/platform/cfg-float64.json
          --minimum-speedup 5.0 --maximum-native-code-bytes 400
          | Out-File -Encoding utf8
          build/platform/cfg-float64-performance-gate.json

      - name: Enforce strict SIMD CFG-loop floor on Unix
        if: runner.os != 'Windows'
        run: >-
          python3 tool/performance_gate.py cfg-simd
          build/platform/cfg-simd.json
          --minimum-scalar-speedup 1.10
          --minimum-interpreter-speedup 10.0
          --maximum-native-code-bytes 1024
          > build/platform/cfg-simd-performance-gate.json

      - name: Enforce strict SIMD CFG-loop floor on Windows
        if: runner.os == 'Windows'
        run: >-
          python tool/performance_gate.py cfg-simd
          build/platform/cfg-simd.json
          --minimum-scalar-speedup 1.10
          --minimum-interpreter-speedup 10.0
          --maximum-native-code-bytes 1024
          | Out-File -Encoding utf8
          build/platform/cfg-simd-performance-gate.json

      - name: Retain CFG Float64 platform evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cfg-float64-${{ matrix.name }}
          path: |
            build/platform/cfg-float64.json
            build/platform/cfg-float64-performance-gate.json
          if-no-files-found: error

      - name: Retain strict SIMD platform evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cfg-simd-${{ matrix.name }}
          path: |
            build/platform/cfg-simd.json
            build/platform/cfg-simd-performance-gate.json
          if-no-files-found: error

      - name: Install
        run: >-
          cmake --install build/platform --config RelWithDebInfo
          --prefix build/install

      - name: Configure package consumer on Unix
        if: runner.os != 'Windows'
        run: >-
          cmake -S test/package -B build/package-consumer -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_PREFIX_PATH=${{ github.workspace }}/build/install

      - name: Configure package consumer on Windows
        if: runner.os == 'Windows'
        run: >-
          cmake -S test/package -B build/package-consumer -A x64
          -DCMAKE_PREFIX_PATH=${{ github.workspace }}/build/install

      - name: Build installed-package consumer
        run: >-
          cmake --build build/package-consumer --config Release --parallel

      - name: Run installed-package consumer on Unix
        if: runner.os != 'Windows'
        run: ./build/package-consumer/unijit_package_consumer

      - name: Run installed-package consumer on Windows
        if: runner.os == 'Windows'
        run: .\build\package-consumer\Release\unijit_package_consumer.exe
