name: Language frontend and performance baselines

on:
  workflow_call:

permissions:
  contents: read

jobs:
  lua-reference-baseline:
    name: Lua 5.5 and LuaJIT baseline
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Configure isolated reference runtimes
        run: >-
          cmake -S . -B build/language -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DUNIJIT_BUILD_TESTS=ON
          -DUNIJIT_BUILD_BENCHMARKS=ON
          -DUNIJIT_WARNINGS_AS_ERRORS=ON
          -DUNIJIT_BUILD_LUA_REFERENCE=ON
          -DUNIJIT_BUILD_LUAJIT_REFERENCE=ON

      - name: Build reference runtimes
        run: >-
          cmake --build build/language --parallel
          --target unijit_lua55 unijit_lua55_tests
          unijit_lua55_benchmark_runner unijit_luajit_reference

      - name: Test UniJIT Lua frontend
        run: >-
          ctest --test-dir build/language --output-on-failure
          -R unijit.lua55_

      - name: Run semantic and performance baseline
        run: >-
          python3 benchmark/lua/run_reference.py
          --lua build/language/bin/lua5.5-reference
          --luajit build/language/references/luajit/src/luajit
          --warmup 10000 --iterations 100000 --samples 3
          > build/language/lua-reference.json

      - name: Compare stock Lua, UniJIT, and LuaJIT integer execution
        run: >-
          python3 benchmark/lua/run_integer.py
          --lua build/language/bin/lua5.5-reference
          --unijit build/language/bin/lua5.5-unijit
          --luajit build/language/references/luajit/src/luajit
          --warmup 10000 --iterations 100000 --samples 3
          > build/language/lua-integer.json

      - name: Compare stock Lua, UniJIT, and LuaJIT numeric loops
        run: >-
          python3 benchmark/lua/run_integer.py
          --script benchmark/lua/integer_loop.lua
          --lua build/language/bin/lua5.5-reference
          --unijit build/language/bin/lua5.5-unijit
          --luajit build/language/references/luajit/src/luajit
          --warmup 1000 --iterations 300000 --samples 7 --trials 3
          > build/language/lua-integer-loop.json

      - name: Enforce Lua commercial performance floor
        run: >-
          python3 tool/performance_gate.py lua
          build/language/lua-integer-loop.json
          --minimum-stock-speedup 1.25
          --minimum-luajit-speedup 1.10
          > build/language/lua-integer-loop-performance-gate.json

      - name: Compare parameterized Lua numeric loops
        run: >-
          python3 benchmark/lua/run_integer.py
          --script benchmark/lua/integer_parameter_loop.lua
          --lua build/language/bin/lua5.5-reference
          --unijit build/language/bin/lua5.5-unijit
          --luajit build/language/references/luajit/src/luajit
          --warmup 1000 --iterations 300000 --samples 7 --trials 3
          > build/language/lua-integer-parameter-loop.json

      - name: Enforce parameterized Lua loop performance floor
        run: >-
          python3 tool/performance_gate.py lua
          build/language/lua-integer-parameter-loop.json
          --minimum-stock-speedup 1.25
          --minimum-luajit-speedup 1.10
          > build/language/lua-integer-parameter-loop-performance-gate.json

      - name: Compare stock Lua, UniJIT, and LuaJIT Float64 execution
        run: >-
          python3 benchmark/lua/run_integer.py
          --script benchmark/lua/float_call.lua
          --lua build/language/bin/lua5.5-reference
          --unijit build/language/bin/lua5.5-unijit
          --luajit build/language/references/luajit/src/luajit
          --warmup 10000 --iterations 100000 --samples 3
          > build/language/lua-float.json

      - name: Retain Lua target baselines
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lua-target-baselines
          path: |
            build/language/lua-reference.json
            build/language/lua-integer.json
            build/language/lua-integer-loop.json
            build/language/lua-integer-loop-performance-gate.json
            build/language/lua-integer-parameter-loop.json
            build/language/lua-integer-parameter-loop-performance-gate.json
            build/language/lua-float.json
          if-no-files-found: error

  quickjs-reference-baseline:
    name: QuickJS frontend and baseline
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: actions/setup-node@v7
        with:
          node-version: 26.5.0

      - name: Configure stock QuickJS and UniJIT frontend
        run: >-
          cmake -S . -B build/quickjs -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DUNIJIT_BUILD_TESTS=ON
          -DUNIJIT_BUILD_BENCHMARKS=ON
          -DUNIJIT_WARNINGS_AS_ERRORS=ON
          -DUNIJIT_BUILD_QUICKJS_REFERENCE=ON

      - name: Build QuickJS frontend and benchmark
        run: >-
          cmake --build build/quickjs --parallel
          --target unijit_quickjs_tests unijit_quickjs_benchmark

      - name: Test QuickJS frontend
        run: >-
          ctest --test-dir build/quickjs --output-on-failure
          -R unijit.quickjs_

      - name: Compare QuickJS and UniJIT with V8 Jitless and V8
        run: >-
          python3 benchmark/quickjs/run_v8.py
          --unijit build/quickjs/bin/unijit_quickjs_benchmark
          --node "$(command -v node)"
          --warmup 10000 --iterations 100000 --samples 3
          > build/quickjs/quickjs-targets.json

      - name: Enforce QuickJS commercial performance floor
        run: >-
          python3 tool/performance_gate.py quickjs
          build/quickjs/quickjs-targets.json
          --minimum-stock-speedup 1.25
          --minimum-v8-jitless-speedup 1.10
          > build/quickjs/quickjs-performance-gate.json

      - name: Retain QuickJS target baseline
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: quickjs-target-baseline
          path: |
            build/quickjs/quickjs-targets.json
            build/quickjs/quickjs-performance-gate.json
          if-no-files-found: error

  pocketpy-reference-baseline:
    name: PocketPy and CPython 3.14.6 JIT baseline
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Fetch verified official CPython 3.14.6 JIT runtime
        env:
          PYTHON_PACKAGE: build/python-3.14.6/python-3.14.6-macos11.pkg
          PYTHON_SHA256: d3c9fff52214847e4fab03e9eaf53dd2a8e51e3534aa0b61f201b749f86bef28
        run: |
          mkdir -p "$(dirname "$PYTHON_PACKAGE")"
          curl --fail --location --retry 3 \
            https://www.python.org/ftp/python/3.14.6/python-3.14.6-macos11.pkg \
            --output "$PYTHON_PACKAGE"
          echo "$PYTHON_SHA256  $PYTHON_PACKAGE" | shasum -a 256 --check
          pkgutil --expand-full "$PYTHON_PACKAGE" \
            build/python-3.14.6/expanded
          mkdir -p build/python-3.14.6/Frameworks/Python.framework
          ln -s ../../expanded/Python_Framework.pkg/Payload/Versions \
            build/python-3.14.6/Frameworks/Python.framework/Versions

      - name: Configure stock PocketPy and UniJIT frontend
        run: >-
          cmake -S . -B build/pocketpy -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DUNIJIT_BUILD_TESTS=ON
          -DUNIJIT_BUILD_BENCHMARKS=ON
          -DUNIJIT_WARNINGS_AS_ERRORS=ON
          -DUNIJIT_BUILD_POCKETPY_REFERENCE=ON

      - name: Build PocketPy frontend and benchmark
        run: >-
          cmake --build build/pocketpy --parallel
          --target unijit_pocketpy_reference_tests
          unijit_pocketpy_translator_tests unijit_pocketpy_benchmark

      - name: Test PocketPy frontend
        run: >-
          ctest --test-dir build/pocketpy --output-on-failure
          -R unijit.pocketpy_

      - name: Compare PocketPy and UniJIT with CPython and CPython JIT
        env:
          DYLD_FRAMEWORK_PATH: ${{ github.workspace }}/build/python-3.14.6/Frameworks
          PYTHONHOME: ${{ github.workspace }}/build/python-3.14.6/expanded/Python_Framework.pkg/Payload/Versions/3.14
          PYTHON_EXECUTABLE: ${{ github.workspace }}/build/python-3.14.6/expanded/Python_Framework.pkg/Payload/Versions/3.14/bin/python3.14
        run: >-
          "$PYTHON_EXECUTABLE" benchmark/pocketpy/run_cpython.py
          --unijit build/pocketpy/bin/unijit_pocketpy_benchmark
          --python "$PYTHON_EXECUTABLE"
          --warmup 10000 --iterations 100000 --samples 3
          > build/pocketpy/pocketpy-targets.json

      - name: Enforce PocketPy commercial performance floor
        run: >-
          python3 tool/performance_gate.py pocketpy
          build/pocketpy/pocketpy-targets.json
          --minimum-stock-speedup 1.25
          --minimum-cpython-speedup 1.10
          --minimum-cpython-jit-speedup 1.10
          > build/pocketpy/pocketpy-performance-gate.json

      - name: Retain PocketPy target baseline
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pocketpy-target-baseline
          path: |
            build/pocketpy/pocketpy-targets.json
            build/pocketpy/pocketpy-performance-gate.json
          if-no-files-found: error
